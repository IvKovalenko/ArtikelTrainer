<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="robots" content="noindex">
<title>Вход — Тренажёр артиклей</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #ffffff; --ink: #2b2b2b; --muted: #9a9a9a;
    --line: #dcdcdc; --line-hover: #bdbdbd; --hover: #f5f5f4;
    --green: #2f9e44; --red: #e03131; --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 22px calc(22px + env(safe-area-inset-left)) calc(22px + env(safe-area-inset-bottom));
  }
  .box { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; text-align: center; }
  h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .sub { margin: 0 0 4px; color: var(--muted); font-size: 14px; }
  input {
    width: 100%; padding: 14px; font: inherit; font-size: 17px; color: var(--ink);
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
  }
  input:focus { outline: none; border-color: var(--line-hover); }
  button.primary {
    width: 100%; padding: 14px; font: inherit; font-size: 17px; color: #fff;
    background: var(--ink); border: none; border-radius: var(--radius); cursor: pointer;
    transition: opacity .12s ease;
  }
  button.primary:hover { opacity: .88; }
  button.primary:disabled { opacity: .5; cursor: default; }
  .toggle { background: none; border: none; color: var(--muted); font: inherit; font-size: 14px; cursor: pointer; padding: 4px; }
  .toggle:hover { color: var(--ink); text-decoration: underline; }
  .msg { min-height: 20px; font-size: 14px; color: var(--red); }
</style>
</head>
<body>
<main>
  <form class="box" id="form" autocomplete="on">
    <h1>Тренажёр артиклей</h1>
    <p class="sub" id="mode-sub">Вход в аккаунт</p>
    <input id="email" type="email" name="email" autocomplete="email"
           placeholder="Email" aria-label="Email" required autofocus>
    <input id="pw" type="password" name="password" autocomplete="current-password"
           placeholder="Пароль" aria-label="Пароль" required minlength="8">
    <button type="submit" class="primary" id="submit">Войти</button>
    <div class="msg" id="msg"></div>
    <button type="button" class="toggle" id="toggle">Нет аккаунта? Зарегистрироваться</button>
  </form>
</main>
<script>
  const LS_TOKEN = "auth-token";
  const LS_PROGRESS = "article-progress";
  const form = document.getElementById("form");
  const email = document.getElementById("email");
  const pw = document.getElementById("pw");
  const msg = document.getElementById("msg");
  const submit = document.getElementById("submit");
  const toggle = document.getElementById("toggle");
  const modeSub = document.getElementById("mode-sub");
  let mode = "login"; // login | register

  function setMode(m) {
    mode = m;
    if (m === "login") {
      modeSub.textContent = "Вход в аккаунт";
      submit.textContent = "Войти";
      pw.autocomplete = "current-password";
      toggle.textContent = "Нет аккаунта? Зарегистрироваться";
    } else {
      modeSub.textContent = "Регистрация";
      submit.textContent = "Создать аккаунт";
      pw.autocomplete = "new-password";
      toggle.textContent = "Уже есть аккаунт? Войти";
    }
    msg.textContent = "";
  }
  toggle.addEventListener("click", () => setMode(mode === "login" ? "register" : "login"));

  const ERRORS = {
    "invalid-email": "Некорректный email",
    "weak-password": "Пароль должен быть не короче 8 символов",
    "email-taken": "Такой email уже зарегистрирован",
    "invalid-credentials": "Неверный email или пароль",
    "missing-credentials": "Заполните email и пароль",
    "rate-limited": "Слишком много попыток. Подождите немного и попробуйте снова.",
  };

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "";
    submit.disabled = true;
    try {
      const r = await fetch("/api/auth/" + mode, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ email: email.value.trim(), password: pw.value }),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && data.token) {
        localStorage.setItem(LS_TOKEN, data.token);
        localStorage.removeItem(LS_PROGRESS);   // свежий аккаунт — свой прогресс подтянется с сервера
        location.replace("/");
        return;
      }
      msg.textContent = ERRORS[data.error] || "Ошибка. Попробуйте ещё раз.";
    } catch {
      msg.textContent = "Ошибка сети";
    }
    submit.disabled = false;
    pw.select();
  });
</script>
</body>
</html>
