<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="robots" content="noindex">
<title data-i18n="docTitleLogin">Вход — Artikel Drill</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<script src="i18n.js"></script>
<script src="auth-form.js"></script>
<style>
  :root {
    --bg: #ffffff; --ink: #2b2b2b; --muted: #9a9a9a;
    --line: #dcdcdc; --line-hover: #bdbdbd; --hover: #f5f5f4;
    --green: #2f9e44; --red: #e03131; --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 22px calc(22px + env(safe-area-inset-left)) calc(22px + env(safe-area-inset-bottom));
  }
  .box { width: 100%; max-width: 360px; }
  h1 { margin: 0 0 12px; font-size: 22px; font-weight: 700; letter-spacing: -0.4px; text-align: center; }
  .foot { text-align: center; margin-top: 16px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .foot a { color: var(--muted); }
</style>
</head>
<body>
<main>
  <div class="box">
    <h1 data-i18n="appTitle">Artikel Drill</h1>
    <div id="auth-form"></div>
  </div>
  <div class="foot">
    <span class="lang-switch" id="lang-switch"></span>
    <a href="/privacy.html" data-i18n="privacyPolicy">Политика конфиденциальности</a>
  </div>
</main>
<script>
  // уже вошёл — на главную (страница входа не нужна)
  if (localStorage.getItem("auth-token")) location.replace("/");

  const params = new URLSearchParams(location.search);

  const form = AuthForm.mount(document.getElementById("auth-form"), {
    mode: params.get("mode") === "register" ? "register" : "login",
    // после входа локальный прогресс сохраняется — на главной он сольётся с серверным
    onSuccess: () => location.replace("/"),
  });
  form.focus();

  // возврат по ссылке из письма: /login.html?verified=1|0
  const verified = params.get("verified");
  if (verified === "1") form.setMsg(I18N.t("verifiedOk"), true);
  else if (verified === "0") form.setMsg(I18N.t("errVerifyInvalid"));

  I18N.mountSwitcher(document.getElementById("lang-switch"));
</script>
</body>
</html>
