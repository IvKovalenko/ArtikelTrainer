<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="robots" content="noindex">
<title data-i18n="docTitleReset">Сброс пароля — Тренажёр артиклей</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<script src="i18n.js"></script>
<style>
  :root {
    --bg: #ffffff; --ink: #2b2b2b; --muted: #9a9a9a;
    --line: #dcdcdc; --line-hover: #bdbdbd; --hover: #f5f5f4;
    --green: #2f9e44; --red: #e03131; --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 22px calc(22px + env(safe-area-inset-left)) calc(22px + env(safe-area-inset-bottom));
  }
  .box { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; text-align: center; }
  h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .sub { margin: 0 0 4px; color: var(--muted); font-size: 14px; }
  input {
    width: 100%; padding: 14px; font: inherit; font-size: 17px; color: var(--ink);
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
  }
  input:focus { outline: none; border-color: var(--line-hover); }
  button.primary {
    width: 100%; padding: 14px; font: inherit; font-size: 17px; color: #fff;
    background: var(--ink); border: none; border-radius: var(--radius); cursor: pointer;
    transition: opacity .12s ease;
  }
  button.primary:hover { opacity: .88; }
  button.primary:disabled { opacity: .5; cursor: default; }
  .msg { min-height: 20px; font-size: 14px; color: var(--red); }
  .msg.ok { color: var(--green); }
  .foot { text-align: center; margin-top: 16px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .foot a { color: var(--muted); }
</style>
</head>
<body>
<main>
  <form class="box" id="form">
    <h1 data-i18n="resetTitle">Сброс пароля</h1>
    <p class="sub" id="sub"></p>
    <input id="email" type="email" name="email" autocomplete="email"
           placeholder="Email" aria-label="Email" required>
    <input id="pw" type="password" name="password" autocomplete="new-password"
           required minlength="8" hidden
           data-i18n-placeholder="newPasswordPlaceholder" data-i18n-aria="newPasswordPlaceholder">
    <button type="submit" class="primary" id="submit"></button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="foot">
    <span class="lang-switch" id="lang-switch"></span>
    <a href="/login.html" data-i18n="backToLogin">Вернуться ко входу</a>
  </div>
</main>
<script>
  const LS_TOKEN = "auth-token";
  const LS_PROGRESS = "article-progress";
  const form = document.getElementById("form");
  const email = document.getElementById("email");
  const pw = document.getElementById("pw");
  const msg = document.getElementById("msg");
  const submit = document.getElementById("submit");
  const sub = document.getElementById("sub");
  // с токеном в URL — режим нового пароля, без — режим запроса ссылки
  const token = new URLSearchParams(location.search).get("token");

  function renderMode() {
    if (token) {
      sub.textContent = I18N.t("resetNewSub");
      submit.textContent = I18N.t("changePassword");
      email.hidden = true; email.required = false;
      pw.hidden = false;
    } else {
      sub.textContent = I18N.t("resetRequestSub");
      submit.textContent = I18N.t("sendResetLink");
    }
  }

  function setMsg(text, ok) {
    msg.textContent = text;
    msg.className = "msg" + (ok ? " ok" : "");
  }

  const ERRORS = {
    "invalid-email": "errInvalidEmail",
    "weak-password": "errWeakPassword",
    "invalid-token": "errResetInvalid",
    "rate-limited": "errRateLimited",
    "mail-not-configured": "errMailFailed",
  };

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setMsg("");
    submit.disabled = true;
    try {
      const url = token ? "/api/auth/reset" : "/api/auth/forgot";
      const payload = token ? { token, password: pw.value } : { email: email.value.trim() };
      const r = await fetch(url, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && token && data.token) {          // пароль сменён → сразу входим
        localStorage.setItem(LS_TOKEN, data.token);
        localStorage.removeItem(LS_PROGRESS);     // прогресс аккаунта подтянется с сервера
        setMsg(I18N.t("resetDone"), true);
        setTimeout(() => location.replace("/"), 900);
        return;
      }
      if (r.ok && !token) {                       // письмо (возможно) отправлено
        setMsg(I18N.t("resetSent"), true);
        submit.disabled = false;
        return;
      }
      setMsg(I18N.t(ERRORS[data.error] || "errGeneric"));
    } catch {
      setMsg(I18N.t("errNetwork"));
    }
    submit.disabled = false;
  });

  I18N.mountSwitcher(document.getElementById("lang-switch"));
  I18N.onChange(renderMode);
  renderMode();
</script>
</body>
</html>
