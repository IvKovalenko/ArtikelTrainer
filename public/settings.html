<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="robots" content="noindex">
<title data-i18n="docTitleSettings">Настройки — Artikel Drill</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<script src="i18n.js"></script>
<style>
  :root {
    --bg: #ffffff; --ink: #2b2b2b; --muted: #9a9a9a;
    --line: #dcdcdc; --line-hover: #bdbdbd; --hover: #f5f5f4;
    --green: #2f9e44; --red: #e03131; --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 22px calc(22px + env(safe-area-inset-left)) calc(22px + env(safe-area-inset-bottom));
  }
  .box { width: 100%; max-width: 360px; }
  h1 { margin: 0 0 18px; font-size: 22px; font-weight: 700; letter-spacing: -0.4px; text-align: center; }
  .setting { display: flex; flex-direction: column; gap: 12px; }
  .setting + .setting { margin-top: 26px; }
  .setting-label { font-size: 15px; color: var(--ink); }
  input[type="range"] { width: 100%; accent-color: var(--ink); }
  .setting-value { text-align: center; font-size: 20px; font-weight: 700; }
  .setting-check { display: flex; align-items: flex-start; gap: 10px; font-size: 15px; cursor: pointer; }
  .setting-check input { width: 18px; height: 18px; margin: 1px 0 0; flex: none; accent-color: var(--ink); }
  .foot { text-align: center; margin-top: 26px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .foot a { color: var(--muted); }
</style>
</head>
<body>
<main>
  <div class="box">
    <h1 data-i18n="settings">Настройки</h1>
    <div class="setting">
      <label class="setting-label" for="master-slider" data-i18n="masterPctLabel">Процент слов, необходимый для перехода на следующий уровень</label>
      <input type="range" id="master-slider" min="80" max="95" step="5" list="master-ticks">
      <datalist id="master-ticks">
        <option value="80"></option><option value="85"></option>
        <option value="90"></option><option value="95"></option>
      </datalist>
      <div class="setting-value" id="master-value">95%</div>
    </div>
    <div class="setting">
      <label class="setting-label" for="delay-right" data-i18n="delayRightLabel">Задержка после правильного ответа</label>
      <input type="range" id="delay-right" min="200" max="2000" step="50">
      <div class="setting-value" id="delay-right-value">0.85 с</div>
    </div>
    <div class="setting">
      <label class="setting-label" for="delay-wrong" data-i18n="delayWrongLabel">Задержка после неправильного ответа (при автопереходе)</label>
      <input type="range" id="delay-wrong" min="500" max="4000" step="100">
      <div class="setting-value" id="delay-wrong-value">1.7 с</div>
    </div>
    <div class="setting">
      <label class="setting-check">
        <input type="checkbox" id="wrong-pause">
        <span data-i18n="wrongPauseLabel">После ошибки не переключать слово автоматически, а ждать подтверждения</span>
      </label>
    </div>
  </div>
  <div class="foot">
    <span class="lang-switch" id="lang-switch"></span>
    <a href="/" data-i18n="backToApp">Вернуться в приложение</a>
  </div>
</main>
<script>
  // Настройка живёт в __meta внутри прогресса (localStorage "article-progress"):
  // при возвращении в приложение app.js дольёт её на сервер аккаунта.
  const LS_PROGRESS = "article-progress";
  const STEPS = [80, 85, 90, 95];
  const slider = document.getElementById("master-slider");
  const value = document.getElementById("master-value");

  function loadProgress() {
    try {
      const o = JSON.parse(localStorage.getItem(LS_PROGRESS) || "{}");
      return o && typeof o === "object" && !Array.isArray(o) ? o : {};
    } catch { return {}; }
  }

  const saved = (loadProgress().__meta || {}).masterPct;
  slider.value = STEPS.includes(saved) ? saved : 95;
  value.textContent = slider.value + "%";

  slider.addEventListener("input", () => {
    const p = loadProgress();                 // свежая копия — ничего не затираем
    const m = p.__meta || (p.__meta = {});
    m.masterPct = parseInt(slider.value, 10);
    m.masterPctAt = Date.now();               // при слиянии побеждает поздний выбор
    try { localStorage.setItem(LS_PROGRESS, JSON.stringify(p)); } catch {}
    value.textContent = slider.value + "%";
  });

  // остальные настройки: та же схема — __meta.<поле> + метка времени <поле>At
  function saveMeta(field, val) {
    const p = loadProgress();
    const m = p.__meta || (p.__meta = {});
    m[field] = val;
    m[field + "At"] = Date.now();
    try { localStorage.setItem(LS_PROGRESS, JSON.stringify(p)); } catch {}
  }

  const pauseCheck = document.getElementById("wrong-pause");
  pauseCheck.checked = !!(loadProgress().__meta || {}).wrongPause;
  pauseCheck.addEventListener("change", () => saveMeta("wrongPause", pauseCheck.checked ? 1 : 0));

  // задержки автоперехода (мс); «0.85 с» — без хвостовых нулей
  const fmtSeconds = (ms) =>
    (ms / 1000).toFixed(2).replace(/\.?0+$/, "") + " " + I18N.t("secondsShort");
  const delays = [["delay-right", "delayRight", 850], ["delay-wrong", "delayWrong", 1700]];
  for (const [id, field, def] of delays) {
    const s = document.getElementById(id);
    const v = document.getElementById(id + "-value");
    const saved = (loadProgress().__meta || {})[field];
    s.value = Number.isFinite(saved) ? saved : def;
    v.textContent = fmtSeconds(s.value);
    s.addEventListener("input", () => {
      saveMeta(field, parseInt(s.value, 10));
      v.textContent = fmtSeconds(s.value);
    });
  }
  I18N.onChange(() => {   // единица секунд зависит от языка
    for (const [id] of delays) {
      const s = document.getElementById(id);
      document.getElementById(id + "-value").textContent = fmtSeconds(s.value);
    }
  });

  I18N.mountSwitcher(document.getElementById("lang-switch"));
</script>
</body>
</html>
