<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Артикли">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
<title>Тренажёр артиклей</title>
</head>
<body>

<main class="app">
  <header class="top">
    <div class="level" id="level">Уровень: A1</div>
    <div class="stats">
      <span class="ok"><span class="mark">✓</span> <span id="stat-correct">0</span></span>
      <span class="bad"><span class="mark">✕</span> <span id="stat-wrong">0</span></span>
      <span class="passed"><span id="stat-passed">0</span> слов пройдено</span>
    </div>
  </header>

  <div class="progress" id="progress" title="Прогресс до следующего уровня">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>

  <section class="card">
    <div class="word" id="word">…</div>
    <div class="gloss" id="gloss"></div>
    <div class="answers" id="answers">
      <button class="answer" data-article="der">der</button>
      <button class="answer" data-article="die">die</button>
      <button class="answer" data-article="das">das</button>
      <button class="answer" data-article="Plural">Plural</button>
    </div>
    <div class="hint" id="hint"></div>
  </section>

  <footer class="bottom">
    <span class="sync" id="sync" title="Состояние синхронизации"></span>
    <span class="links">
      <button class="linkbtn" id="btn-data">Показать данные</button>
      <button class="linkbtn" id="btn-reset">Сбросить статистику</button>
      <button class="linkbtn" id="btn-logout">Выйти</button>
    </span>
  </footer>
</main>

<div class="overlay" id="overlay" hidden>
  <div class="dialog">
    <div class="dialog-head">
      <h2>Статистика</h2>
      <button class="linkbtn" id="btn-close">Закрыть</button>
    </div>
    <p class="dialog-sub" id="account-info"></p>
    <p class="dialog-sub" id="data-summary"></p>
    <div class="table-wrap">
      <table class="stats-table" id="stats-table">
        <thead>
          <tr>
            <th data-col="word" scope="col">Слово</th>
            <th data-col="correct" class="num" scope="col" title="Правильных ответов">✓</th>
            <th data-col="wrong" class="num" scope="col" title="Неправильных ответов">✕</th>
            <th data-col="seen" class="num" scope="col" title="Сколько раз показано">Показов</th>
          </tr>
        </thead>
        <tbody id="stats-body"></tbody>
      </table>
    </div>
    <details class="json-data">
      <summary>Данные (JSON) — экспорт / импорт</summary>
      <textarea id="data-json" spellcheck="false"></textarea>
      <div class="dialog-actions">
        <button class="linkbtn" id="btn-copy">Копировать</button>
        <button class="linkbtn" id="btn-import">Импортировать из поля</button>
      </div>
    </details>
    <span class="dialog-msg" id="dialog-msg"></span>
    <div class="danger-zone">
      <button class="linkbtn danger" id="btn-delete-account">Удалить аккаунт</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
