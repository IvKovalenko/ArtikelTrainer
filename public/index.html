<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Artikel Drill">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
<title data-i18n="docTitle">Artikel Drill</title>
<script src="i18n.js"></script>
</head>
<body>

<main class="app">
  <header class="top">
    <div class="level" id="level">Уровень: A1</div>
    <div class="stats">
      <span class="ok"><span class="mark">✓</span> <span id="stat-correct">0</span></span>
      <span class="bad"><span class="mark">✕</span> <span id="stat-wrong">0</span></span>
      <span class="passed"><span id="stat-passed">0</span> <span data-i18n="wordsPassed">слов пройдено</span></span>
    </div>
  </header>

  <div class="progress" id="progress" data-i18n-title="progressTitle" title="Прогресс до следующего уровня">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>

  <!-- призыв к регистрации — только для анонимных -->
  <div class="register-nudge" id="register-nudge" hidden>
    <span data-i18n="registerNudge">Не хочешь потерять прогресс и хочешь продолжить на других устройствах?</span>
    <button id="btn-nudge-register" data-i18n="registerNudgeCta">Зарегистрируйся!</button>
  </div>

  <section class="card">
    <div class="word" id="word">…</div>
    <div class="gloss" id="gloss"></div>
    <div class="answers" id="answers">
      <button class="answer" data-article="der">der<kbd class="key">1</kbd></button>
      <button class="answer" data-article="die">die<kbd class="key">2</kbd></button>
      <button class="answer" data-article="das">das<kbd class="key">3</kbd></button>
      <button class="answer" data-article="Plural">Plural<kbd class="key">4</kbd></button>
    </div>
    <div class="keys-hint"><kbd data-i18n="keySpace">Пробел</kbd>/<kbd>Enter</kbd> <span data-i18n="keyNext">— дальше</span></div>
    <div class="hint" id="hint"></div>
  </section>

  <footer class="bottom">
    <span class="lang-switch" id="lang-switch"></span>
    <span class="sync" id="sync" hidden></span>
    <span class="links">
      <button class="linkbtn" id="btn-data" data-i18n="statistics">Статистика</button>
      <button class="linkbtn" id="btn-signin" data-i18n="signInLink" hidden>Войти в аккаунт</button>
      <button class="linkbtn" id="btn-register" data-i18n="registerLink" hidden>Зарегистрироваться</button>
      <button class="linkbtn" id="btn-account" data-i18n="account" hidden>Аккаунт</button>
      <button class="linkbtn" id="btn-settings" data-i18n="settings">Настройки</button>
      <a class="linkbtn" href="/privacy.html" target="_blank" rel="noopener" data-i18n="privacyPolicy">Политика конфиденциальности</a>
    </span>
  </footer>
</main>

<!-- Окно статистики -->
<div class="overlay" id="overlay" hidden>
  <div class="dialog">
    <div class="dialog-head">
      <h2 data-i18n="statistics">Статистика</h2>
      <button class="linkbtn" id="btn-close" data-i18n="close">Закрыть</button>
    </div>
    <p class="dialog-sub" id="data-summary"></p>
    <div class="table-wrap">
      <table class="stats-table" id="stats-table">
        <thead>
          <tr>
            <th data-col="word" scope="col" data-i18n="colWord">Слово</th>
            <th data-col="correct" class="num ok" scope="col" data-i18n-title="colCorrectTitle" title="Правильных ответов">✓</th>
            <th data-col="wrong" class="num bad" scope="col" data-i18n-title="colWrongTitle" title="Неправильных ответов">✕</th>
            <th data-col="seen" class="num" scope="col" data-i18n="colSeen" data-i18n-title="colSeenTitle" title="Сколько раз показано">Показов</th>
          </tr>
        </thead>
        <tbody id="stats-body"></tbody>
      </table>
    </div>
    <details class="json-data">
      <summary data-i18n="jsonSummary">Данные (JSON) — экспорт / импорт</summary>
      <textarea id="data-json" spellcheck="false"></textarea>
      <div class="dialog-actions">
        <button class="linkbtn" id="btn-copy" data-i18n="copy">Копировать</button>
        <button class="linkbtn" id="btn-import" data-i18n="importFromField">Импортировать из поля</button>
      </div>
    </details>
    <span class="dialog-msg" id="dialog-msg"></span>
    <div class="dialog-foot">
      <button class="linkbtn danger" id="btn-reset" data-i18n="resetStats">Сбросить статистику</button>
    </div>
  </div>
</div>

<!-- Окно аккаунта -->
<div class="overlay" id="account-overlay" hidden>
  <div class="dialog">
    <div class="dialog-head">
      <h2 data-i18n="account">Аккаунт</h2>
      <button class="linkbtn" id="btn-account-close" data-i18n="close">Закрыть</button>
    </div>
    <p class="dialog-sub" id="account-info">…</p>
    <button class="btn-block" id="btn-logout" data-i18n="logout">Выйти</button>
    <span class="dialog-msg" id="account-msg"></span>
    <div class="danger-zone">
      <button class="linkbtn danger" id="btn-delete-account" data-i18n="deleteAccount">Удалить аккаунт</button>
    </div>
  </div>
</div>

<!-- Окно настроек (десктоп; на узких экранах — страница settings.html) -->
<div class="overlay" id="settings-overlay" hidden>
  <div class="dialog">
    <div class="dialog-head">
      <h2 data-i18n="settings">Настройки</h2>
      <button class="linkbtn" id="btn-settings-close" data-i18n="close">Закрыть</button>
    </div>
    <div class="setting">
      <label class="setting-label" for="master-slider" data-i18n="masterPctLabel">Процент слов, необходимый для перехода на следующий уровень</label>
      <input type="range" id="master-slider" min="80" max="95" step="5" list="master-ticks">
      <datalist id="master-ticks">
        <option value="80"></option><option value="85"></option>
        <option value="90"></option><option value="95"></option>
      </datalist>
      <div class="setting-value" id="master-value">95%</div>
    </div>
  </div>
</div>

<!-- Окно входа/регистрации (десктоп; на узких экранах — страница login.html) -->
<div class="overlay" id="auth-overlay" hidden>
  <div class="dialog auth-dialog">
    <div class="dialog-head">
      <h2 id="auth-title"></h2>
      <button class="linkbtn" id="btn-auth-close" data-i18n="close">Закрыть</button>
    </div>
    <div id="auth-form"></div>
  </div>
</div>

<script src="auth-form.js"></script>
<script src="app.js"></script>
</body>
</html>
