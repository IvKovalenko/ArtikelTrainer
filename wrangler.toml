name = "artikel-trainer"
compatibility_date = "2025-06-01"
pages_build_output_dir = "public"

# KV для хранения статистики (один JSON под ключом "article-progress").
# 1) Создай namespace:   npx wrangler kv namespace create PROGRESS
# 2) Вставь выданный id ниже (и preview_id для локальной разработки).
[[kv_namespaces]]
binding = "PROGRESS"
id = "54b4bdc0259a4e049a8d5fba0d5d815b"
# preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# Необязательная защита записи. Секрет НЕ хранить здесь в открытом виде —
# задать через:  npx wrangler pages secret put SYNC_TOKEN

# Пароль доступа ко всему сайту (страница входа /login.html). Секрет НЕ хранить
# здесь — задать через:  npx wrangler pages secret put SITE_PASSWORD
# Пока секрет не задан, сайт открыт (защита выключена). Для локальной разработки
# пароль берётся из файла .dev.vars.

# D1 (SQL) для многопользовательской версии: таблицы users/progress (см. schema.sql).
# 1) Создай базу:        npx wrangler d1 create artikel
# 2) Вставь выданный database_id ниже.
# 3) Применить схему:    npx wrangler d1 execute artikel --remote --file=./schema.sql
[[d1_databases]]
binding = "DB"
database_name = "artikel"
database_id = "fdce321b-ffea-471a-9ccf-bc362873ed7a"

# Секрет для подписи JWT — задать через: npx wrangler pages secret put JWT_SECRET
# Локально берётся из .dev.vars (JWT_SECRET=...).
